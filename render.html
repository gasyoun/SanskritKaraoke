<!DOCTYPE html>
<!--
  render.html — Headless batch renderer (ADR-0002).
  Loaded by Puppeteer via tools/render_chapter.js.
  No UI; exposes window.renderVerse() called via page.evaluate().
-->
<html lang="sa">
<head>
<meta charset="utf-8">
<style>
  /* Charis SIL is the local substitute for Charter Indologique (both derived from Bitstream Charter).
     Sanskrit 2003 is used for Devanāgarī. */
  @font-face { font-family: 'Sanskrit 2003';       src: url('src/fonts/Sanskrit2003.ttf') format('truetype'); font-display: block; }
  @font-face { font-family: 'Charter Indologique'; src: url('src/fonts/charis-sil.ttf') format('truetype'); font-weight: 400; font-display: block; }
  @font-face { font-family: 'Charter Indologique'; src: url('src/fonts/charis-sil-bold.ttf') format('truetype'); font-weight: 700; font-display: block; }
  body { margin: 0; background: #fff; }
</style>
</head>
<body>
<script type="module">
import { devToIast, syllabifyIast, syllabifyVerse } from './src/core/translit.js';
import { computeSharedColWidths } from './src/core/layout.js';
import { buildWaveSvgString }     from './src/core/svg.js';
import { composePngFrame }        from './src/core/compose.js';
import {
  currentSylIndex, laghuDuration, isKeyActive,
  updateCamera, drawStoryFrame,
  buildCues, toSrt, toVtt,
} from './src/core/karaoke-frame.js';
import { prepareFeed, drawFeedFrame, FEED_W, FEED_H } from './src/core/feed.js';

/** Base64-encode an ArrayBuffer. */
function toBase64(buf) {
  const bytes = new Uint8Array(buf);
  let binary = '';
  for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  return btoa(binary);
}

/** Decode a base64 string to an ArrayBuffer. */
function fromBase64(b64) {
  const binary = atob(b64);
  const buf = new ArrayBuffer(binary.length);
  const view = new Uint8Array(buf);
  for (let i = 0; i < binary.length; i++) view[i] = binary.charCodeAt(i);
  return buf;
}

/**
 * Render one verse to MP4 + captions.
 *
 * @param {Object} verseJson   — verse JSON (id, s1, s2, s1dev, s2dev, meter, timing, audio, …)
 * @param {string} audioBase64 — audio file encoded as base64 (any format ffmpeg/WebAudio can decode)
 * @param {Object} [opts]
 *   format:   '9:16' | '1:1'   (default '9:16')
 *   fps:       number           (default 30)
 *   template: 'classic' | 'feed_v1'   (feed_v1 = native-vertical karaoke; default classic)
 *   handle:   '@your_handle'  (feed_v1 watermark)
 *   cta:      'samskrtam.ru/usha-sanka'  (feed_v1 CTA text)
 *   lang:     'ru' | 'en'     (feed_v1 end-card translation language)
 *   footer:   {author, year, url, source, meter}
 *   colors:   {guru, laghu}
 *   showDev:  boolean
 *
 * @returns {Promise<{mp4Base64: string, srtText: string, vttText: string}>}
 */
async function renderVerse(verseJson, audioBase64, opts = {}) {
  const template = opts.template || 'classic';
  const fmt    = template === 'feed_v1' ? '9:16' : (opts.format || '9:16');
  const FPS    = opts.fps     || 30;
  const footer = opts.footer  || {};
  const guruCol  = opts.colors?.guru   || '#8B0000';
  const laghuCol = opts.colors?.laghu  || '#2C4A1E';
  const showDev  = opts.showDev ?? false;

  const [storyW, storyH] = template === 'feed_v1' ? [FEED_W, FEED_H]
    : (fmt === '1:1' ? [1080, 1080] : [1080, 1920]);

  // Wait for fonts
  await document.fonts.ready;

  // ── Syllables ──
  const syllables = syllabifyVerse(verseJson);

  // ── Timing ──
  const timing = verseJson.timing || { s1: [], s2: [] };
  // padaBounds from timing meta if available, else null
  const padaBounds = verseJson.timing?.padaBounds || null;

  // ── Decode audio ──
  const audioBuf = fromBase64(audioBase64);
  const actx     = new AudioContext();
  const audioBuffer = await actx.decodeAudioData(audioBuf);
  await actx.close();
  const duration    = audioBuffer.duration;
  const sampleRate  = audioBuffer.sampleRate;
  const numChannels = audioBuffer.numberOfChannels;
  const totalFrames = Math.ceil(duration * FPS);
  const frameDurUs  = Math.round(1_000_000 / FPS);

  // ── Per-template frame painter: paintFrame(wdc, t) ──
  let paintFrame;
  if (template === 'feed_v1') {
    const prep = prepareFeed(verseJson, syllables, {
      handle: opts.handle || footer.handle || '',
      cta:    opts.cta    || footer.cta    || footer.url || '',
      lang:   opts.lang   || 'ru',
    });
    paintFrame = (wdc, t) => drawFeedFrame(wdc, prep, timing, padaBounds, t, duration);
  } else {
    // classic: compose a 1920×1080 academic frame and pan a 9:16 camera over it
    const composeOpts = {
      guruColor: guruCol, laghuColor: laghuCol,
      showDev, waveScale: 0.5, greyIast: true,
      footer: { ...footer, meter: footer.meter || verseJson.meter || '' },
    };
    const { canvas: baseCanvas, sylPositions } = await composePngFrame(verseJson, syllables, composeOpts);
    const BW = baseCanvas.width, BH = baseCanvas.height; // 1920 × 1080
    const allXPos = [];
    for (const key of ['s1', 's2'])
      for (const col in (sylPositions[key] || {})) allXPos.push(sylPositions[key][col].x);
    allXPos.sort((a, b) => a - b);
    let avgSpacing = 120;
    if (allXPos.length >= 2) {
      const spacings = allXPos.slice(1).map((x, i) => x - allXPos[i]).filter(d => d > 4);
      if (spacings.length) { spacings.sort((a, b) => a - b); avgSpacing = spacings[Math.floor(spacings.length / 2)]; }
    }
    const sylsToShow = 3;
    let srcW = avgSpacing * (sylsToShow + 0.5);
    let srcH = srcW * (storyH / storyW);
    if (srcH > BH) { srcH = BH; srcW = BH * (storyW / storyH); }
    srcW = Math.max(srcW, 80); srcH = Math.max(srcH, 80);
    const minCamX = srcW / 2, maxCamX = BW - srcW / 2;
    const minCamY = srcH / 2, maxCamY = BH - srcH / 2;
    let camX = BW / 2, camY = BH / 2;
    const s1Sorted = [...(syllables.s1 || [])].sort((a, b) => a.col - b.col);
    if (s1Sorted.length) {
      const p0 = sylPositions.s1?.[s1Sorted[0].col];
      if (p0) { camX = p0.x; camY = p0.y; }
    }
    camX = Math.max(minCamX, Math.min(maxCamX, camX));
    camY = Math.max(minCamY, Math.min(maxCamY, camY));
    let cam = { camX, camY };
    const LERP = 0.10;
    paintFrame = (wdc, t) => {
      cam = updateCamera(cam, sylPositions, timing, syllables, padaBounds, t,
                         { minX: minCamX, maxX: maxCamX, minY: minCamY, maxY: maxCamY }, LERP);
      drawStoryFrame(wdc, baseCanvas, cam, srcW, srcH, storyW, storyH,
                     sylPositions, timing, syllables, padaBounds, t);
    };
  }

  // ── WebCodecs muxer ──
  if (typeof Mp4Muxer === 'undefined') throw new Error('mp4-muxer not loaded (add <script> in render.html)');
  const { Muxer, ArrayBufferTarget } = Mp4Muxer;
  const target = new ArrayBufferTarget();
  const muxer  = new Muxer({
    target, fastStart: 'in-memory',
    video: { codec: 'avc', width: storyW, height: storyH },
    audio: { codec: 'aac', sampleRate, numberOfChannels: numChannels },
  });

  const videoConfig = { codec: 'avc1.640028', width: storyW, height: storyH, bitrate: 8_000_000, framerate: FPS };
  const support = await VideoEncoder.isConfigSupported(videoConfig);
  if (!support.supported) throw new Error('avc1 codec not supported in this Chromium');

  const videoEncoder = new VideoEncoder({
    output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
    error:  e => { throw new Error('VideoEncoder: ' + e.message); },
  });
  videoEncoder.configure(videoConfig);

  const workCanvas = document.createElement('canvas');
  workCanvas.width = storyW; workCanvas.height = storyH;
  const wdc = workCanvas.getContext('2d');

  // ── Encode video frames (capture a representative thumbnail mid-way) ──
  let thumbnailBase64 = '';
  const thumbAt = Math.min(duration * 0.4, (timing.s1?.[0] || 0) + 1.0);
  for (let fi = 0; fi < totalFrames; fi++) {
    const t = fi / FPS;
    paintFrame(wdc, t);
    if (!thumbnailBase64 && t >= thumbAt) {
      thumbnailBase64 = workCanvas.toDataURL('image/png').split(',')[1];
    }
    const bitmap = await createImageBitmap(workCanvas);
    const vf = new VideoFrame(bitmap, { timestamp: fi * frameDurUs, duration: frameDurUs });
    videoEncoder.encode(vf, { keyFrame: fi % (FPS * 2) === 0 });
    vf.close(); bitmap.close();
  }
  if (!thumbnailBase64) {
    paintFrame(wdc, Math.min(thumbAt, duration));
    thumbnailBase64 = workCanvas.toDataURL('image/png').split(',')[1];
  }
  await videoEncoder.flush();

  // ── Encode audio ──
  const audioEncoder = new AudioEncoder({
    output: (chunk, meta) => muxer.addAudioChunk(chunk, meta),
    error:  e => { throw new Error('AudioEncoder: ' + e.message); },
  });
  audioEncoder.configure({ codec: 'mp4a.40.2', sampleRate, numberOfChannels: numChannels, bitrate: 128_000 });
  const CHUNK = 4096;
  const channelData = Array.from({ length: numChannels }, (_, c) => audioBuffer.getChannelData(c));
  for (let offset = 0; offset < audioBuffer.length; offset += CHUNK) {
    const len = Math.min(CHUNK, audioBuffer.length - offset);
    const ts  = Math.round(offset / sampleRate * 1_000_000);
    const interleaved = new Float32Array(len * numChannels);
    for (let i = 0; i < len; i++)
      for (let c = 0; c < numChannels; c++)
        interleaved[i * numChannels + c] = channelData[c][offset + i];
    const ad = new AudioData({ format: 'f32', sampleRate, numberOfFrames: len, numberOfChannels: numChannels, timestamp: ts, data: interleaved });
    audioEncoder.encode(ad); ad.close();
  }
  await audioEncoder.flush();
  muxer.finalize();

  // ── Captions ──
  const cues   = buildCues(syllables, timing);
  const srtText = toSrt(cues);
  const vttText = toVtt(cues);

  // ── Return ──
  const mp4Base64 = toBase64(target.buffer);
  return { mp4Base64, srtText, vttText, thumbnailBase64 };
}

// Expose globally so Puppeteer can call via page.evaluate()
window.renderVerse = renderVerse;
window._renderReady = true;
</script>
<!-- mp4-muxer: same pinned CDN version + SRI as index.html -->
<script src="https://cdn.jsdelivr.net/npm/mp4-muxer@5.2.2/build/mp4-muxer.js" integrity="sha384-wr0AQH9RBAKio/g7bHM5245MBCU5B/b0Y9u42cTxRYQQJXKEijZvWEJKL9JG26hs" crossorigin="anonymous"></script>
</body>
</html>
