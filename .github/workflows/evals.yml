name: Teaching Pipeline Evals
on:
  push:
    paths:
      - 'agents/teaching_pipeline/**'
      - 'evals/**'
  pull_request:
    paths:
      - 'agents/teaching_pipeline/**'
      - 'evals/**'

jobs:
  run-evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Run Evals (Deterministic Mode)
        run: python evals/judge.py
        env:
          # Note: No API keys provided in CI for now.
          # Deterministic fallback will handle verification.
          PYTHONPATH: .
      - name: Verify Results
        run: python evals/check_report.py
